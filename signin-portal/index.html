<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - AppName</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="signin-card">
            <div class="logo">
                <i class="fas fa-rocket"></i>
            </div>
            <h1>Welcome to AppName</h1>
            <p class="subtitle">Sign in to get started with your account</p>

            <form id="signinForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="signin-btn">Sign In</button>
            </form>

            <div class="divider">
                <span>or continue with</span>
            </div>

            <button class="google-btn" onclick="openGooglePicker()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
                Continue with Google
            </button>

            <p class="signup-text">
                Don't have an account? <a href="#" onclick="openGooglePicker()">Sign Up</a>
            </p>
        </div>
    </div>

    <!-- Google Account Picker Modal -->
    <div id="googlePickerModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <div class="modal-header">
                <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google" class="google-logo-modal">
                <button class="modal-close" onclick="closeGooglePicker()">&times;</button>
            </div>
            <h3 class="modal-title">Choose an account</h3>
            <p class="modal-subtitle">to continue to AppName</p>

            <!-- Pre-suggested accounts -->
            <div class="account-list" id="savedAccounts">
                <!-- Saved accounts will be populated here -->
            </div>

            <div class="divider-line"><span>or</span></div>

            <button class="add-account-btn" onclick="showAddAccountForm()">
                <i class="fas fa-plus-circle"></i>
                Use another account
            </button>

            <!-- Add Account Form (hidden by default) -->
            <div id="addAccountForm" style="display:none;">
                <div class="input-group">
                    <label for="googleName">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="googleName" placeholder="Enter your full name" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="googleEmail">Google Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="googleEmail" placeholder="Enter your Google email" required>
                    </div>
                </div>
                <button class="signin-btn continue-btn" onclick="confirmGoogleAccount()">Continue</button>
            </div>

            <p class="modal-footer-text">
                By continuing, Google will share your name, email address, and profile picture with AppName.
                <a href="#">Privacy Policy</a>
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
